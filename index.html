<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DIG!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header>
      <h1>⛏ DIG!</h1>
    </header>

    <div id="stats">
      <div class="stat">
        <span class="label">Coins</span>
        <span id="stat-coins">0</span>
      </div>
      <div class="stat">
        <span class="label">Gemmes</span>
        <span id="stat-gems">0</span>
      </div>
      <div class="stat">
        <span class="label">Prof.</span>
        <span id="stat-depth">1m</span>
      </div>
      <div class="stat">
        <span class="label">Pioche</span>
        <span id="stat-pickaxe">Nv.1</span>
      </div>
      <div class="stat">
        <span class="label">Dégâts</span>
        <span id="stat-damage">1</span>
      </div>
    </div>

    <!-- Bannière de boost (visible uniquement quand un boost est actif) -->
    <div id="boost-banner" hidden aria-live="polite">
      <span id="boost-text"></span>
      <span id="boost-timer"></span>
    </div>

    <div id="game-area">
      <div id="block-container">

        <div id="block-header">
          <div id="block-name"></div>
          <div id="block-rarity"></div>
        </div>

        <div id="block">
          <span id="block-icon"></span>
        </div>

        <div id="hp-bar-wrap">
          <div id="hp-bar"></div>
        </div>
        <div id="hp-text"></div>

        <div id="block-reward"></div>

      </div>
    </div>

    <!-- Panneau à onglets : Améliorations / Objectifs / Collection / Quotidien -->
    <div id="panels">

      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-panel="upgrades" role="tab" aria-selected="true">
          Améliorations
        </button>
        <button class="tab-btn" data-panel="quests" role="tab" aria-selected="false">
          Objectifs
          <span class="tab-badge" id="badge-quests" hidden></span>
        </button>
        <button class="tab-btn" data-panel="collection" role="tab" aria-selected="false">
          Collection
          <span class="tab-badge" id="badge-collection" hidden></span>
        </button>
        <button class="tab-btn" data-panel="daily" role="tab" aria-selected="false">
          Quotidien
          <span class="tab-badge" id="badge-daily" hidden></span>
        </button>
      </div>

      <!-- Panel Améliorations -->
      <div id="panel-upgrades" class="panel" role="tabpanel">
        <div id="upgrades-list"></div>
        <button id="btn-reset">Réinitialiser la partie</button>
      </div>

      <!-- Panel Objectifs -->
      <div id="panel-quests" class="panel hidden" role="tabpanel">
        <div id="quests-list"></div>
      </div>

      <!-- Panel Collection -->
      <div id="panel-collection" class="panel hidden" role="tabpanel">
        <div id="collection-header"></div>
        <div id="collection-grid"></div>
      </div>

      <!-- Panel Quotidien -->
      <div id="panel-daily" class="panel hidden" role="tabpanel">
      </div>

    </div>

  </div>

  <div id="save-toast" aria-live="polite">Sauvegardé ✓</div>

  <script src="js/gameState.js"></script>
  <script src="js/blocks.js"></script>
  <script src="js/upgrades.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/quests.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/save.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
