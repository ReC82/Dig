<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DIG!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header>
      <h1>⛏ DIG!</h1>
    </header>

    <div id="stats">
      <div class="stat">
        <span class="label">Coins</span>
        <span id="stat-coins">0</span>
      </div>
      <div class="stat">
        <span class="label">Gemmes</span>
        <span id="stat-gems">0</span>
      </div>
      <div class="stat">
        <span class="label">Prof.</span>
        <span id="stat-depth">1m</span>
      </div>
      <div class="stat">
        <span class="label">Pioche</span>
        <span id="stat-pickaxe">Nv.1</span>
      </div>
      <div class="stat">
        <span class="label">Dégâts</span>
        <span id="stat-damage">1</span>
      </div>
      <div class="stat">
        <span class="label">Reliques</span>
        <span id="stat-relics">0</span>
      </div>
    </div>

    <!-- Bannière boost -->
    <div id="boost-banner" hidden aria-live="polite">
      <span id="boost-text"></span>
      <span id="boost-timer"></span>
    </div>

    <!-- ── Vues ─────────────────────────────────────────────────────────── -->

    <!-- Vue Dig -->
    <div id="view-dig" class="view">
      <div id="block-container">

        <div id="block-header">
          <div id="block-name"></div>
          <div id="block-rarity"></div>
        </div>

        <div id="block">
          <span id="block-icon"></span>
        </div>

        <div id="hp-bar-wrap">
          <div id="hp-bar"></div>
        </div>
        <div id="hp-text"></div>
        <div id="block-reward"></div>

        <!-- Zone pub récompensée -->
        <div id="ad-zone">
          <button id="btn-watch-ad" class="ad-btn"
            aria-label="Regarder une publicité pour doubler la récompense">
            <span class="ad-btn-icon">📺</span>
            <span class="ad-btn-text">Doubler la récompense</span>
          </button>
          <div id="ad-timer" aria-live="polite"></div>
        </div>

      </div>
    </div>

    <!-- Vue Améliorations + Objectifs -->
    <div id="view-upgrades" class="view hidden">
      <div id="upgrades-list"></div>
      <div class="section-divider"><span>🎯 Objectifs</span></div>
      <div id="quests-list"></div>
      <button id="btn-reset">Réinitialiser la partie</button>
    </div>

    <!-- Vue Collection -->
    <div id="view-collection" class="view hidden">
      <div id="collection-header"></div>
      <div id="collection-grid"></div>
      <div class="section-divider" style="margin-top:22px"><span>🔮 Reliques</span></div>
      <div id="relics-info"></div>
      <div id="relics-grid"></div>
    </div>

    <!-- Vue Quotidien -->
    <div id="view-daily" class="view hidden"></div>

    <!-- Vue Boutique -->
    <div id="view-shop" class="view hidden"></div>

    <!-- ── Navigation bas ─────────────────────────────────────────────── -->
    <nav id="bottom-nav" role="navigation" aria-label="Navigation principale">

      <button class="nav-btn active" data-view="dig" aria-label="Creuser">
        <span class="nav-icon-wrap">
          <span class="nav-icon">⛏</span>
        </span>
        <span class="nav-label">Dig</span>
      </button>

      <button class="nav-btn" data-view="upgrades" aria-label="Améliorations">
        <span class="nav-icon-wrap">
          <span class="nav-icon">⚙</span>
          <span class="nav-badge" id="badge-upgrades" hidden></span>
        </span>
        <span class="nav-label">Amélios</span>
      </button>

      <button class="nav-btn" data-view="collection" aria-label="Collection">
        <span class="nav-icon-wrap">
          <span class="nav-icon">📦</span>
          <span class="nav-badge" id="badge-collection" hidden></span>
        </span>
        <span class="nav-label">Collection</span>
      </button>

      <button class="nav-btn" data-view="daily" aria-label="Récompense quotidienne">
        <span class="nav-icon-wrap">
          <span class="nav-icon">📅</span>
          <span class="nav-badge" id="badge-daily" hidden></span>
        </span>
        <span class="nav-label">Quotidien</span>
      </button>

      <button class="nav-btn" data-view="shop" aria-label="Boutique">
        <span class="nav-icon-wrap">
          <span class="nav-icon">🛒</span>
        </span>
        <span class="nav-label">Boutique</span>
      </button>

    </nav>

  </div><!-- /#app -->

  <!-- ── Modale publicité simulée ─────────────────────────────────────────── -->
  <div id="ad-modal" hidden role="dialog" aria-modal="true" aria-labelledby="ad-modal-title">
    <div id="ad-modal-inner">

      <div id="ad-mock-content">
        <div id="ad-mock-logo">⛏</div>
        <div id="ad-mock-title">DIG! — Edition Pro</div>
        <div id="ad-mock-sub">Doublez tous vos gains !</div>
        <div id="ad-bar-wrap">
          <div id="ad-bar-fill"></div>
        </div>
      </div>

      <div id="ad-modal-footer">
        <div id="ad-countdown" aria-live="polite">5</div>
        <button id="btn-close-ad" hidden>Récupérer le bonus →</button>
        <button id="btn-skip-ad">Passer ✕</button>
      </div>

    </div>
  </div>

  <!-- ── Modale coffre ─────────────────────────────────────────────────────── -->
  <div id="chest-modal" hidden role="dialog" aria-modal="true" aria-labelledby="chest-modal-title">
    <div id="chest-modal-inner">
      <div id="chest-icon-wrap">
        <span id="chest-modal-icon"></span>
      </div>
      <div id="chest-modal-rarity"></div>
      <div id="chest-modal-title"></div>
      <div id="chest-modal-reward-label">Contenu</div>
      <div id="chest-modal-reward"></div>
      <button id="btn-collect-chest">Récupérer !</button>
    </div>
  </div>

  <div id="save-toast" aria-live="polite">Sauvegardé ✓</div>

  <script src="js/gameState.js"></script>
  <script src="js/blocks.js"></script>
  <script src="js/upgrades.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/quests.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/dailyMissions.js"></script>
  <script src="js/relics.js"></script>
  <script src="js/monetization.js"></script>
  <script src="js/chests.js"></script>
  <script src="js/save.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
